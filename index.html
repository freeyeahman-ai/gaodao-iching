                                "en": "The Arousing: success. Thunder comes with shock, yet laughter follows; the sacrificial spoon is not dropped."
                        },
                        "lines": [
                                "震来虩虩，后笑言哑哑，吉。",
                                "震来厉，亿丧贝，跻于九陵，勿逐，七日得。",
                                "震苏苏，震行无眚。",
                                "震遂泥。",
                                "震往来厉，亿无丧，有事。",
                                "震索索，视矍矍，征凶。震不于其躬，于其邻，无咎。婚媾有言。"
                        ]
                },
                "100101": {
                        "name": {
                                "zh": "火雷噬嗑",
                                "en": "Biting Through (Shi He)"
                        },
                        "explanation": {
                                "zh": "噬嗑卦象征决断执行，离电遇震雷。'噬嗑亨，利用狱'，颐中有物曰噬嗑。刚柔分动而明，雷电合而章。问事需果断处理事务，除障碍。",
                                "en": "Biting Through—success through decisive enforcement. Lightning and thunder unite to illuminate and move. This hexagram represents the need to remove obstacles through decisive action, like biting through tough material. Proper legal or disciplinary measures bring success in removing hindrances."
                        },
                        "judgment": {
                                "zh": "亨。利用狱。",
                                "en": "Biting Through: success. It furthers to administer justice."
                        },
                        "lines": [
                                "屦校灭趾，无咎。",
                                "噬肤灭鼻，无咎。",
                                "噬腊肉，遇毒，小吝，无咎。",
                                "噬干胏，得金矢，利艰贞，吉。",
                                "噬干肉，得黄金，贞厉，无咎。",
                                "何校灭耳，凶。"
                        ]
                },
                "100110": {
                        "name": {
                                "zh": "泽雷随",
                                "en": "Following (Sui)"
                        },
                        "explanation": {
                                "zh": "随卦象征随顺时势，震雷从兑悦。'随元亨利贞无咎'，泽中有雷，君子以向晦入宴息。随之道在随时，官有渝从正吉，出门交有功。问事宜顺应时势，不可固执。",
                                "en": "Following—supreme success through adaptation. Thunder in the lake indicates following natural rhythms. The wise person follows the time, resting when it is dark and acting when it is light. Success comes through flexibility and harmonious adaptation to circumstances, not rigid adherence to plans."
                        },
                        "judgment": {
                                "zh": "元亨利贞，无咎。",
                                "en": "Following: sublime success; perseverance furthers; no blame."
                        },
                        "lines": [
                                "官有渝，贞吉。出门交有功。",
                                "系小子，失丈夫。",
                                "系丈夫，失小子。随有求得，利居贞。",
                                "随有获，贞凶。有孚在道，以明，何咎。",
                                "孚于嘉，吉。",
                                "拘系之，乃从维之。王用亨于西山。"
                        ]
                },
                "100111": {
                        "name": {
                                "zh": "天雷无妄",
                                "en": "Innocence (Wu Wang)"
                        },
                        "explanation": {
                                "zh": "无妄卦象真实自然，震雷上动。'元亨利贞，其匪正有眚'，天下雷行，万物皆惊，真实不虚也。妄言祸至，无妄则福随。问事宜真诚待人，不可妄为，自有吉祥。",
                                "en": "Without falsehood—supreme success. Thunder moves under Heaven, startling all things into authenticity. Success comes through sincerity and natural action. Deception or calculated manipulation brings calamity. Remain true to your nature and circumstances will align favorably."
                        },
                        "judgment": {
                                "zh": "元亨利贞。其匪正有眚，不利有攸往。",
                                "en": "Innocence: sublime success; perseverance furthers. If one is not as one should be, calamity; it does not further to undertake."
                        },
                        "lines": [
                                "无妄，往吉。",
                                "不耕获，不菑畬，则利有攸往。",
                                "无妄之灾，或系之牛，行人之得，邑人之灾。",
                                "可贞，无咎。",
                                "无妄之疾，勿药有喜。",
                                "无妄，行有眚，无攸利。"
                        ]
                },
                "101000": {
                        "name": {
                                "zh": "地火明夷",
                                "en": "Darkening of the Light (Ming Yi)"
                        },
                        "explanation": {
                                "zh": "明夷卦象征光明受伤，离火入坤地。'明夷利艰贞'，明入地中伤则晦，晦则忧忧则用晦而明。问事暂时受挫，需要忍耐。",
                                "en": "Darkening of the Light—perseverance through difficulty. Fire enters the Earth, its light obscured. This hexagram indicates a time when the bright must suffer injury and hide their light. While the light is darkened, maintain correct principles in adversity. Difficult times eventually pass."
                        },
                        "judgment": {
                                "zh": "利艰贞。",
                                "en": "Darkening of the Light: perseverance in hardship furthers."
                        },
                        "lines": [
                                "明夷于飞，垂其翼。君子于行，三日不食。有攸往，主人有言。",
                                "明夷，夷于左股，用拯马壮，吉。",
                                "明夷于南狩，得其大首，不可疾贞。",
                                "入于左腹，获明夷之心，出于门庭。",
                                "箕子之明夷，利贞。",
                                "不明晦，初登于天，后入于地。"
                        ]
                },
                "101001": {
                        "name": {
                                "zh": "山火贲",
                                "en": "Grace (Bi)"
                        },
                        "explanation": {
                                "zh": "贲卦象征文饰美化，离火照艮山。'贲亨小利有攸往'，文明以止人文也。问事宜注重外表，但不可过分。",
                                "en": "Grace—success in small matters. Fire at the foot of the mountain illuminates and adorns. This hexagram indicates the appropriate use of ornament and culture to beautify and refine. Grace brings benefit, but should not become the substance. Success in small affairs; be cautious in great ones."
                        },
                        "judgment": {
                                "zh": "亨。小利有攸往。",
                                "en": "Grace: success. In small matters it furthers to undertake."
                        },
                        "lines": [
                                "贲其趾，舍车而徒。",
                                "贲其须。",
                                "贲如濡如，永贞吉。",
                                "贲如皤如，白马翰如，匪寇婚媾。",
                                "贲于丘园，束帛戋戋，吝，终吉。",
                                "白贲，无咎。"
                        ]
                },
                "101010": {
                        "name": {
                                "zh": "水火既济",
                                "en": "After Completion (Ji Ji)"
                        },
                        "explanation": {
                                "zh": "既济卦象征事已成功，离火上照坎水。'既济亨，小利贞初吉终乱'。成功之后戒慎恐惧，思患豫防方保终吉。",
                                "en": "After Completion—success in small matters. Water over fire completes the cooking. This hexagram indicates a time when things are complete and successful, but this very completion contains the seeds of new disorder. Guard against complacency; maintain vigilance even after success."
                        },
                        "judgment": {
                                "zh": "亨小，利贞。初吉终乱。",
                                "en": "After Completion: success in small things; perseverance furthers. Fortune at first, disorder at last."
                        },
                        "lines": [
                                "曳其轮，濡其尾，无咎。",
                                "妇丧其茀，勿逐，七日得。",
                                "高宗伐鬼方，三年克之，小人勿用。",
                                "繻有衣袽，终日戒。",
                                "东邻杀牛，不如西邻之禴祭，实受其福。",
                                "濡其首，厉。"
                        ]
                },
                "101011": {
                        "name": {
                                "zh": "风火家人",
                                "en": "The Family (Jia Ren)"
                        },
                        "explanation": {
                                "zh": "家人卦象征家庭和睦，离火出于巽风。'家人有严君焉，父母之谓也'。父父子子兄兄弟弟夫夫妇妇而家道正。问事家庭关系和谐，宜重视家庭。",
                                "en": "The Family—benefit through proper relationships. Wind comes from fire, creating warmth that reaches all. This hexagram emphasizes the importance of family order—fathers fathering, sons sonning, etc. When family relationships are correct, all under Heaven becomes stable."
                        },
                        "judgment": {
                                "zh": "利女贞。",
                                "en": "The Family: the woman's perseverance furthers."
                        },
                        "lines": [
                                "闲有家，悔亡。",
                                "无攸遂，在中馈，贞吉。",
                                "家人嗃嗃，悔厉吉。妇子嘻嘻，终吝。",
                                "富家，大吉。",
                                "王假有家，勿恤吉。",
                                "有孚威如，终吉。"
                        ]
                },
                "101100": {
                        "name": {
                                "zh": "雷火丰",
                                "en": "Abundance (Feng)"
                        },
                        "explanation": {
                                "zh": "丰卦象征丰盛繁荣，震雷遇离火。'丰亨，王假之勿忧宜日中'，丰大也，宜照天下。问事事业繁荣，运势亨通。",
                                "en": "Abundance—supreme success. Thunder and lightning unite, creating great illumination. This hexagram indicates a time of fullness and prosperity when clarity and action unite. Do not worry—maintain this peak period like the sun at noon. Prepare for the natural cycle of decrease that follows abundance."
                        },
                        "judgment": {
                                "zh": "亨，王假之，勿忧，宜日中。",
                                "en": "Abundance: success; the king attains it. Grieve not; be like the sun at noon."
                        },
                        "lines": [
                                "遇其配主，虽旬无咎，往有尚。",
                                "丰其蔀，日中见斗，往得疑疾。有孚发若，吉。",
                                "丰其沛，日中见沫，折其右肱，无咎。",
                                "丰其蔀，日中见斗，遇其夷主，吉。",
                                "来章，有庆誉，吉。",
                                "丰其屋，蔀其家，窥其户，阒其无人，三岁不觌，凶。"
                        ]
                },
                "101101": {
                        "name": {
                                "zh": "离为火",
                                "en": "The Clinging (Li)"
                        },
                        "explanation": {
                                "zh": "离卦象征光明依附，离火相重。'离利贞亨畜牝牛吉'，火体虚而形丽，万物皆相见。问事前途光明，但需有所依附。柔顺中正则吉。",
                                "en": "The Clinging—success through perseverance and attachment. Fire doubles itself, illuminating all things. This hexagram indicates dependence and attachment, like fire clinging to fuel. Success requires proper attachment—to principles, to wise leaders, to what nourishes. Cultivate the receptive, yielding strength of the cow."
                        },
                        "judgment": {
                                "zh": "利贞，亨。畜牝牛，吉。",
                                "en": "The Clinging: perseverance furthers; success. Keeping a docile cow brings fortune."
                        },
                        "lines": [
                                "履错然，敬之无咎。",
                                "黄离，元吉。",
                                "日昃之离，不鼓缶而歌，则大耋之嗟，凶。",
                                "突如其来如，焚如，死如，弃如。",
                                "出涕沱若，戚嗟若，吉。",
                                "王用出征，有嘉折首，获匪其丑，无咎。"
                        ]
                },
                "101110": {
                        "name": {
                                "zh": "泽火革",
                                "en": "Revolution (Ge)"
                        },
                        "explanation": {
                                "zh": "革卦象征变革除旧，离火焚兑泽。'革己日乃孚，元亨利贞悔亡'。革去故而鼎取新，天地革而四时成，汤武革命顺天应人。问事需改革创新，破旧立新。",
                                "en": "Revolution—transformation occurs when the old is exhausted. Fire in the lake brings change. Just as Heaven and Earth create the four seasons through change, human affairs require periodic renewal. Success comes through timely transformation that responds to genuine need, not forced change."
                        },
                        "judgment": {
                                "zh": "巳日乃孚，元亨利贞，悔亡。",
                                "en": "Revolution: on the appointed day, sincerity; sublime success; perseverance furthers; remorse vanishes."
                        },
                        "lines": [
                                "巩用黄牛之革。",
                                "巳日乃革之，征吉，无咎。",
                                "征凶，贞厉。革言三就，有孚。",
                                "悔亡，有孚改命，吉。",
                                "大人虎变，未占有孚。",
                                "君子豹变，小人革面，征凶，居贞吉。"
                        ]
                },
                "101111": {
                        "name": {
                                "zh": "天火同人",
                                "en": "Fellowship (Tong Ren)"
                        },
                        "explanation": {
                                "zh": "同人卦象征会同同心，离火上照。'同人于野亨，利涉大川'。会同之道贵在正大，以文德感化天下。伏戎于莽、乘其墉者弗克攻而吉，争讼则凶。问事利与人合作，共谋发展。",
                                "en": "Fellowship with others in the open—success, beneficial to cross great waters. This hexagram represents union and cooperation among people. Success comes through openness, shared purpose, and cultural influence. Competition and conflict lead to misfortune; cooperation brings benefit."
                        },
                        "judgment": {
                                "zh": "同人于野，亨。利涉大川，利君子贞。",
                                "en": "Fellowship: fellowship in the open, success. It furthers to cross the great water."
                        },
                        "lines": [
                                "同人于门，无咎。",
                                "同人于宗，吝。",
                                "伏戎于莽，升其高陵，三岁不兴。",
                                "乘其墉，弗克攻，吉。",
                                "同人，先号咷而后笑，大师克相遇。",
                                "同人于郊，无悔。"
                        ]
                },
                "110000": {
                        "name": {
                                "zh": "地泽临",
                                "en": "Approach (Lin)"
                        },
                        "explanation": {
                                "zh": "地泽临卦象征监临督导，兑泽临坤地。'临元亨利贞，至于八月有凶'。以大临小以刚临柔。问事机会来临，宜积极把握。",
                                "en": "Approach—supreme success through proper leadership. The lake approaches the Earth, bringing nourishment. This hexagram indicates a time when great persons approach to teach and assist. However, note the warning: by August (the eighth month), vigilance is required as cycles change."
                        },
                        "judgment": {
                                "zh": "元亨利贞。至于八月有凶。",
                                "en": "Approach: sublime success; perseverance furthers. By the eighth month there will be misfortune."
                        },
                        "lines": [
                                "咸临，贞吉。",
                                "咸临，吉无不利。",
                                "甘临，无攸利。既忧之，无咎。",
                                "至临，无咎。",
                                "知临，大君之宜，吉。",
                                "敦临，吉无咎。"
                        ]
                },
                "110001": {
                        "name": {
                                "zh": "山泽损",
                                "en": "Decrease (Sun)"
                        },
                        "explanation": {
                                "zh": "损卦象征减损付出，兑泽入艮山。'损而有孚元亨利贞'，损下益上其道上行。问事需有所付出，但终有回报。",
                                "en": "Decrease—supreme success through sacrifice. The lake decreases to nourish the mountain. This hexagram indicates that decrease of the lower to benefit the upper brings success. Willing sacrifice and acceptance of loss create the conditions for future gain. What is given up in faith returns multiplied."
                        },
                        "judgment": {
                                "zh": "有孚，元吉，无咎，可贞，利有攸往。曷之用？二簋可用享。",
                                "en": "Decrease: with sincerity, supreme fortune, no blame; perseverance furthers. Two small bowls suffice for the offering."
                        },
                        "lines": [
                                "已事遄往，无咎，酌损之。",
                                "利贞，征凶。弗损益之。",
                                "三人行，则损一人；一人行，则得其友。",
                                "损其疾，使遄有喜，无咎。",
                                "或益之十朋之龟，弗克违，元吉。",
                                "弗损益之，无咎，贞吉，利有攸往，得臣无家。"
                        ]
                },
                "110010": {
                        "name": {
                                "zh": "水泽节",
                                "en": "Limitation (Jie)"
                        },
                        "explanation": {
                                "zh": "节卦象征节制适度，兑泽下临坎水。'节亨，苦节不可贞'，节以制度不伤财不害民。问事宜节制行事，不可过度。",
                                "en": "Limitation—success through restraint. Water over the lake—regulating the flow. This hexagram indicates the necessity of proper limits and boundaries. Not too much, not too little. Limitation through proper institutions brings benefit without causing damage or regret."
                        },
                        "judgment": {
                                "zh": "亨。苦节，不可贞。",
                                "en": "Limitation: success. Bitter limitation cannot be persevered in."
                        },
                        "lines": [
                                "不出户庭，无咎。",
                                "不出门庭，凶。",
                                "不节若，则嗟若，无咎。",
                                "安节，亨。",
                                "甘节，吉，往有尚。",
                                "苦节，贞凶，悔亡。"
                        ]
                },
                "110011": {
                        "name": {
                                "zh": "风泽中孚",
                                "en": "Inner Truth (Zhong Fu)"
                        },
                        "explanation": {
                                "zh": "中孚卦象征诚信忠实，兑泽上有巽风。'中孚豚鱼吉，利涉大川利贞'。诚信为本，感而遂通。问事以诚信为本，可得信任。",
                                "en": "Inner Truth—success through sincerity. Wind over the lake penetrates everywhere. This hexagram indicates the power of genuine, heartfelt truth that can even affect fish and pigs. Sincerity creates the conditions for crossing great waters. Trust and openness bring lasting benefit."
                        },
                        "judgment": {
                                "zh": "豚鱼吉，利涉大川，利贞。",
                                "en": "Inner Truth: even pigs and fish are moved—fortune. It furthers to cross the great water."
                        },
                        "lines": [
                                "虞吉，有它不燕。",
                                "鸣鹤在阴，其子和之。我有好爵，吾与尔靡之。",
                                "得敌，或鼓或罢，或泣或歌。",
                                "月几望，马匹亡，无咎。",
                                "有孚挛如，无咎。",
                                "翰音登于天，贞凶。"
                        ]
                },
                "110100": {
                        "name": {
                                "zh": "雷泽归妹",
                                "en": "The Marrying Maiden (Gui Mei)"
                        },
                        "explanation": {
                                "zh": "归妹卦象征婚配归宿，兑少女从震长男。'归妹征凶无攸利'，天地之大义，天地不交则万物不兴。问事将有归宿，宜顺其自然。",
                                "en": "The Marrying Maiden—undertakings bring misfortune. Thunder over the lake—movement following joy. This hexagram indicates relationships or situations where the proper order is reversed or inappropriate. While unions occur, they may not be fully harmonious. Accept natural outcomes without forcing perfect arrangements."
                        },
                        "judgment": {
                                "zh": "征凶，无攸利。",
                                "en": "The Marrying Maiden: undertaking brings misfortune; nothing furthers."
                        },
                        "lines": [
                                "归妹以娣，跛能履，征吉。",
                                "眇能视，利幽人之贞。",
                                "归妹以须，反归以娣。",
                                "归妹愆期，迟归有时。",
                                "帝乙归妹，其君之袂，不如其娣之袂良。月几望，吉。",
                                "女承筐无实，士刲羊无血，无攸利。"
                        ]
                },
                "110101": {
                        "name": {
                                "zh": "火泽睽",
                                "en": "Opposition (Kui)"
                        },
                        "explanation": {
                                "zh": "睽卦象征乖离不合，离火焚兑泽。'睽小事吉'，异中同也，同中有睽。遇主于巷无咎。问事人际关系有隔阂，需沟通调和。",
                                "en": "Opposition—small matters bring success. Fire moves away from the lake, creating separation. This hexagram indicates a time of divergence and misunderstanding. While differences exist, finding common ground in small things leads to good fortune. Meeting the leader in the byway is not a mistake."
                        },
                        "judgment": {
                                "zh": "小事吉。",
                                "en": "Opposition: in small matters, fortune."
                        },
                        "lines": [
                                "悔亡。丧马勿逐，自复。见恶人，无咎。",
                                "遇主于巷，无咎。",
                                "见舆曳，其牛掣，其人天且劓。无初有终。",
                                "睽孤，遇元夫，交孚，厉无咎。",
                                "悔亡，厥宗噬肤，往何咎。",
                                "睽孤，见豕负涂，载鬼一车。先张之弧，后说之弧。匪寇婚媾，往遇雨则吉。"
                        ]
                },
                "110110": {
                        "name": {
                                "zh": "兑为泽",
                                "en": "The Joyous (Dui)"
                        },
                        "explanation": {
                                "zh": "兑卦象征和悦喜悦，泽水相重。'兑亨利贞'，刚中而柔外，说以利贞。兑为少女，柔和外悦，朋友讲习互相滋益。问事人际关系和谐，心情愉悦。",
                                "en": "The Joyous—success through sincere joy. The lake doubles itself, reflecting and multiplying happiness. This hexagram indicates benefits through open, cheerful communication and mutual learning among friends. Joy based on proper principles brings lasting benefit."
                        },
                        "judgment": {
                                "zh": "亨，利贞。",
                                "en": "The Joyous: success; perseverance furthers."
                        },
                        "lines": [
                                "和兑，吉。",
                                "孚兑，吉，悔亡。",
                                "来兑，凶。",
                                "商兑，未宁，介疾有喜。",
                                "孚于剥，有厉。",
                                "引兑。"
                        ]
                },
                "110111": {
                        "name": {
                                "zh": "天泽履",
                                "en": "Treading (Lu)"
                        },
                        "explanation": {
                                "zh": "履卦象为履行礼仪，兑泽遇乾刚。卦辞'履虎尾不咥人亨'，踩虎尾而不被咬，行事谨慎则吉祥。辨上下定民志，礼之用和为贵。君子体履，行己敬而与人诚。问事宜脚踏实地，谨慎行事，不可冒进。",
                                "en": "Treading upon the tiger's tail without being bitten—success through proper conduct. This hexagram emphasizes careful, respectful behavior in all relationships. The superior person distinguishes high and low, establishing proper order. Progress comes through courtesy and caution, not recklessness."
                        },
                        "judgment": {
                                "zh": "履虎尾，不咥人，亨。",
                                "en": "Treading: treading on the tiger's tail; it does not bite. Success."
                        },
                        "lines": [
                                "素履，往无咎。",
                                "履道坦坦，幽人贞吉。",
                                "眇能视，跛能履，履虎尾，咥人，凶。武人为于大君。",
                                "履虎尾，愬愬，终吉。",
                                "夬履，贞厉。",
                                "视履考祥，其旋元吉。"
                        ]
                },
                "111000": {
                        "name": {
                                "zh": "地天泰",
                                "en": "Peace (Tai)"
                        },
                        "explanation": {
                                "zh": "泰卦象征通泰和谐，乾天交坤地。'小往大来吉亨'，天地交泰。泰之时义大矣哉，吉在交济。问事运势亨通，万事如意。",
                                "en": "Peace—success through interchange. Heaven and Earth unite, creating harmony and flourishing. This hexagram indicates a time of great harmony when the small departs and the great arrives. The interaction of Heaven and Earth brings peace and prosperity to all things."
                        },
                        "judgment": {
                                "zh": "小往大来，吉亨。",
                                "en": "Peace: the small departs, the great approaches; fortune and success."
                        },
                        "lines": [
                                "拔茅茹，以其汇，征吉。",
                                "包荒，用冯河，不遐遗，朋亡，得尚于中行。",
                                "无平不陂，无往不复，艰贞无咎。勿恤其孚，于食有福。",
                                "翩翩不富，以其邻，不戒以孚。",
                                "帝乙归妹，以祉元吉。",
                                "城复于隍，勿用师。自邑告命，贞吝。"
                        ]
                },
                "111001": {
                        "name": {
                                "zh": "山天大畜",
                                "en": "The Taming Power of the Great (Da Chu)"
                        },
                        "explanation": {
                                "zh": "大畜卦象征大积蓄聚，乾刚畜于艮山。'大畜利贞，不家食吉利涉大川'。刚健笃实辉光，日新其德。问事积蓄丰厚，宜待机而动。",
                                "en": "The Taming Power of the Great—benefit through restraint and storage. Heaven within the mountain holds vast power. This hexagram indicates a time of great accumulation and potential that is held in reserve. Do not consume resources at home; rather, store them for great undertakings."
                        },
                        "judgment": {
                                "zh": "利贞。不家食吉，利涉大川。",
                                "en": "Great Taming: perseverance furthers. Not eating at home brings fortune; it furthers to cross the great water."
                        },
                        "lines": [
                                "有厉，利已。",
                                "舆说輹。",
                                "良马逐，利艰贞。曰闲舆卫，利有攸往。",
                                "童牛之牿，元吉。",
                                "豮豕之牙，吉。",
                                "何天之衢，亨。"
                        ]
                },
                "111010": {
                        "name": {
                                "zh": "水天需",
                                "en": "Waiting (Xu)"
                        },
                        "explanation": {
                                "zh": "需卦象征等待需求，乾刚遇坎险。'需有孚光亨贞吉，利涉大川'。需于郊不犯难，需于沙容民畜众。问事需耐心等待，不可急躁。",
                                "en": "Waiting—success through trust and patience. Clouds rise to Heaven, waiting to rain. This hexagram indicates a time when waiting is necessary and beneficial. Wait with confidence and sincerity; the needed resources will arrive. Cross great waters when the proper time comes."
                        },
                        "judgment": {
                                "zh": "有孚，光亨，贞吉。利涉大川。",
                                "en": "Waiting: with sincerity, brilliant success; perseverance brings fortune. It furthers to cross the great water."
                        },
                        "lines": [
                                "需于郊，利用恒，无咎。",
                                "需于沙，小有言，终吉。",
                                "需于泥，致寇至。",
                                "需于血，出自穴。",
                                "需于酒食，贞吉。",
                                "入于穴，有不速之客三人来，敬之终吉。"
                        ]
                },
                "111011": {
                        "name": {
                                "zh": "风天小畜",
                                "en": "The Taming Power of the Small (Xiao Chu)"
                        },
                        "explanation": {
                                "zh": "小畜卦象征小有蓄积，巽风畜乾刚。'小畜亨，密云不雨自我西郊'。问事小有收获，宜继续积累。君子以懿文德。",
                                "en": "The Taming Power of the Small—success through accumulation. Wind across Heaven gathers clouds but does not yet rain. This hexagram indicates a time of small gains and gradual accumulation. The superior person cultivates literary virtue while waiting for the proper time to act."
                        },
                        "judgment": {
                                "zh": "亨。密云不雨，自我西郊。",
                                "en": "Small Taming: success. Dense clouds, no rain, from our western outskirts."
                        },
                        "lines": [
                                "复自道，何其咎，吉。",
                                "牵复，吉。",
                                "舆说辐，夫妻反目。",
                                "有孚，血去惕出，无咎。",
                                "有孚挛如，富以其邻。",
                                "既雨既处，尚德载，妇贞厉。月几望，君子征凶。"
                        ]
                },
                "111100": {
                        "name": {
                                "zh": "雷天大壮",
                                "en": "The Power of the Great (Da Zhuang)"
                        },
                        "explanation": {
                                "zh": "大壮卦象征强大盛壮，震雷上鸣。'大壮利贞，大者壮也'，刚以动故壮，雷在天上。问事力量强大，但需谨慎。壮于趾者凶。",
                                "en": "The Power of the Great—perseverance brings fortune. Thunder in Heaven, powerful and moving. This hexagram indicates great strength and energy, but warns against using force improperly. Power without wisdom leads to misfortune. Restrain the impulse to forcefully advance; true power requires proper timing."
                        },
                        "judgment": {
                                "zh": "利贞。",
                                "en": "Great Power: perseverance furthers."
                        },
                        "lines": [
                                "壮于趾，征凶，有孚。",
                                "贞吉。",
                                "小人用壮，君子用罔，贞厉。羝羊触藩，羸其角。",
                                "贞吉悔亡。藩决不羸，壮于大舆之輹。",
                                "丧羊于易，无悔。",
                                "羝羊触藩，不能退，不能遂，无攸利，艰则吉。"
                        ]
                },
                "111101": {
                        "name": {
                                "zh": "火天大有",
                                "en": "Possession in Great Measure (Da You)"
                        },
                        "explanation": {
                                "zh": "大有卦象征丰盛富有，乾刚照离光。'大有元亨'，柔得尊位大中上下应之，富有之谓大业，日新之谓盛德。问事运势亨通，收获丰硕。",
                                "en": "Possession in Great Measure—supreme success. Fire in Heaven shines far and wide. This hexagram indicates abundant resources and the wise management of great possessions. Success comes through holding a central position while remaining open and responsive to those above and below."
                        },
                        "judgment": {
                                "zh": "元亨。",
                                "en": "Great Possession: sublime success."
                        },
                        "lines": [
                                "无交害，匪咎，艰则无咎。",
                                "大车以载，有攸往，无咎。",
                                "公用亨于天子，小人弗克。",
                                "匪其彭，无咎。",
                                "厥孚交如，威如，吉。",
                                "自天佑之，吉无不利。"
                        ]
                },
                "111110": {
                        "name": {
                                "zh": "泽天夬",
                                "en": "Break-through (Guai)"
                        },
                        "explanation": {
                                "zh": "夬卦象征决断清除，乾刚决兑柔。'夬扬于王庭，孚号有厉'，刚决柔也，健而说决而和。泽上于天，决之将出。问事需果断决策，清除障碍。利有攸往，终有凶也。",
                                "en": "Break-through—resolutely bringing the matter before the court. The lake rises to Heaven, about to break through. This hexagram represents the need for decisive action to remove obstacles. While determination brings progress, be mindful that excessive force may lead to future difficulties."
                        },
                        "judgment": {
                                "zh": "扬于王庭，孚号，有厉。告自邑，不利即戎，利有攸往。",
                                "en": "Breakthrough: proclaimed in the royal court with a sincere cry of danger. It furthers to undertake."
                        },
                        "lines": [
                                "壮于前趾，往不胜为咎。",
                                "惕号，莫夜有戎，勿恤。",
                                "壮于頄，有凶。君子夬夬，独行遇雨，若濡有愠，无咎。",
                                "臀无肤，其行次且。牵羊悔亡，闻言不信。",
                                "苋陆夬夬，中行无咎。",
                                "无号，终有凶。"
                        ]
                },
                "111111": {
                        "name": {
                                "zh": "乾为天",
                                "en": "The Creative (Qian)"
                        },
                        "explanation": {
                                "zh": "乾卦纯阳至健，天之象也。元亨利贞四德：元为仁之原，亨为礼之和，利为义之和，贞为智之正。占得此卦，万事亨通，示人效法天德，自强不息。刚健中正，纯粹精也。君子法天健行，功德完备则获吉祥。问事利刚健进取，不可懈怠。",
                                "en": "Pure Yang, the strongest. The four virtues: Yuan (origination), Heng (success), Li (benefit), Zhen (perseverance). This hexagram indicates supreme success through vigorous, ceaseless effort. The superior person models themselves on Heaven's movement, striving without rest. Benefits come through persistent, righteous action."
                        },
                        "judgment": {
                                "zh": "元亨利贞。",
                                "en": "The Creative: sublime success; perseverance furthers."
                        },
                        "lines": [
                                "潜龙勿用。",
                                "见龙在田，利见大人。",
                                "君子终日乾乾，夕惕若厉，无咎。",
                                "或跃在渊，无咎。",
                                "飞龙在天，利见大人。",
                                "亢龙有悔。"
                        ]
                },
                "011111": {
                        "name": {
                                "zh": "天风姤",
                                "en": "Coming to Meet (Gou)"
                        },
                        "explanation": {
                                "zh": "姤卦象征不期而遇，乾刚遇巽柔。'姤女壮勿用取女'，阴遇阳也，天地相遇品物咸章。鱼沉于渊，五行之类。问事有意外机遇，人际关系变化。宜谨慎防微杜渐。",
                                "en": "Coming to meet—unexpected encounters. The strong meets the yielding. This hexagram warns of chance meetings that may lead to complications, particularly in relationships. While opportunities arise unexpectedly, caution is advised—inspect carefully before committing."
                        },
                        "judgment": {
                                "zh": "女壮，勿用取女。",
                                "en": "Coming to Meet: the maiden is strong; do not marry her."
                        },
                        "lines": [
                                "系于金柅，贞吉。有攸往，见凶，羸豕孚蹢躅。",
                                "包有鱼，无咎，不利宾。",
                                "臀无肤，其行次且，厉，无大咎。",
                                "包无鱼，起凶。",
                                "以杞包瓜，含章，有陨自天。",
                                "姤其角，吝，无咎。"
                        ]
                },
                "010111": {
                        "name": {
                                "zh": "天水讼",
                                "en": "Conflict (Song)"
                        },
                        "explanation": {
                                "zh": "讼卦象征争讼诉讼，坎险遇乾刚。'讼有孚窒惕，中吉终凶'，健而险也。天与水违行，酿成讼端。问事宜和解，诉讼则凶。君子做事谋始，防患于未然。",
                                "en": "Conflict—there is sincerity but it is blocked. Caution brings good fortune in the middle, misfortune at the end. Heaven and water move in opposite directions, creating friction. This hexagram advises settling disputes through mediation rather than litigation. The superior person plans ahead to prevent conflict."
                        },
                        "judgment": {
                                "zh": "有孚窒惕，中吉，终凶。利见大人，不利涉大川。",
                                "en": "Conflict: sincerity meets obstruction; stopping halfway brings fortune, carrying through brings misfortune."
                        },
                        "lines": [
                                "不永所事，小有言，终吉。",
                                "不克讼，归而逋，其邑人三百户，无眚。",
                                "食旧德，贞厉，终吉。或从王事，无成。",
                                "不克讼，复即命，渝安贞，吉。",
                                "讼，元吉。",
                                "或锡之鞶带，终朝三褫之。"
                        ]
                },
                "001111": {
                        "name": {
                                "zh": "天山遁",
                                "en": "Retreat (Dun)"
                        },
                        "explanation": {
                                "zh": "遁卦象征退避隐退，艮山遇乾天。'遁亨小利贞'，天下有山，渐离之象。遯退之时，宜静不宜动，识时务者为俊杰。问事时机不利，宜退守待机。君子以远小人，不恶而严。",
                                "en": "Retreat—success through timely withdrawal. Heaven above the mountain, gradually distancing. This hexagram indicates a time when withdrawal is wiser than advance. The wise person recognizes when conditions are unfavorable and maintains dignity while creating distance from negative influences."
                        },
                        "judgment": {
                                "zh": "亨，小利贞。",
                                "en": "Retreat: success. In small matters perseverance furthers."
                        },
                        "lines": [
                                "遁尾，厉，勿用有攸往。",
                                "执之用黄牛之革，莫之胜说。",
                                "系遁，有疾厉，畜臣妾吉。",
                                "好遁，君子吉，小人否。",
                                "嘉遁，贞吉。",
                                "肥遁，无不利。"
                        ]
                },
                "000111": {
                        "name": {
                                "zh": "天地否",
                                "en": "Stagnation (Pi)"
                        },
                        "explanation": {
                                "zh": "否卦象征闭塞不通，坤阴下凝。'否之匪人不利君子贞，大往小来'。天气上升，地气下沉，阴阳不交。问事阻隔不顺，宜守正待时。小人道长，君子道消，闭塞之象。",
                                "en": "Stagnation—Heaven and Earth do not unite. The creative energy rises, the receptive sinks, creating separation. This hexagram indicates a period when the way of the inferior person prevails and the superior person's way withdraws. Stand firm and wait—the stagnation will eventually transform."
                        },
                        "judgment": {
                                "zh": "否之匪人，不利君子贞，大往小来。",
                                "en": "Stagnation: the superior person's perseverance does not further. The great departs, the small approaches."
                        },
                        "lines": [
                                "拔茅茹，以其汇，贞吉亨。",
                                "包承，小人吉，大人否亨。",
                                "包羞。",
                                "有命无咎，畴离祉。",
                                "休否，大人吉。其亡其亡，系于苞桑。",
                                "倾否，先否后喜。"
                        ]
                },
                "011110": {
                        "name": {
                                "zh": "泽风大过",
                                "en": "Preponderance of the Great (Da Guo)"
                        },
                        "explanation": {
                                "zh": "大过卦象征重大越轨，巽风入兑泽。'大过栋桡，利有攸往亨'。泽灭木，栋不可不刚。独立不惧，遁世无闷。问事有重大变化，需谨慎果断，可成大业。",
                                "en": "Preponderance of the Great—the ridgepole sags under excessive weight. The lake overflows the wood. This hexagram indicates a situation of extraordinary pressure requiring extraordinary measures. While the challenge is great, careful, bold action can accomplish significant results. Stand independent but not isolated."
                        },
                        "judgment": {
                                "zh": "栋桡，利有攸往，亨。",
                                "en": "Preponderance of the Great: the ridgepole sags; it furthers to have somewhere to go. Success."
                        },
                        "lines": [
                                "藉用白茅，无咎。",
                                "枯杨生稊，老夫得其女妻，无不利。",
                                "栋桡，凶。",
                                "栋隆，吉。有它吝。",
                                "枯杨生华，老妇得其士夫，无咎无誉。",
                                "过涉灭顶，凶，无咎。"
                        ]
                },
                "010110": {
                        "name": {
                                "zh": "泽水困",
                                "en": "Oppression (Kun)"
                        },
                        "explanation": {
                                "zh": "困卦象征困穷艰难，坎水入兑泽。'困亨贞大人吉无咎'，困而不失其所亨，穷则变通。困于石、据于蒺藜，入宫不见妻皆凶。问事处于困境，需坚持忍耐。",
                                "en": "Oppression—success through perseverance. The water sinks into the marsh,被困. This hexagram represents hardship and constraint. While the situation is difficult, the superior person preserves their character and finds ways to persevere. Oppression ultimately transforms when one maintains integrity."
                        },
                        "judgment": {
                                "zh": "亨，贞，大人吉，无咎。有言不信。",
                                "en": "Oppression: success; perseverance; the great person has fortune, no blame. Words are not believed."
                        },
                        "lines": [
                                "臀困于株木，入于幽谷，三岁不觌。",
                                "困于酒食，朱绂方来，利用亨祀。征凶，无咎。",
                                "困于石，据于蒺藜。入于其宫，不见其妻，凶。",
                                "来徐徐，困于金车，吝，有终。",
                                "劓刖，困于赤绂。乃徐有说，利用祭祀。",
                                "困于葛藟，于臲卼，曰动悔有悔，征吉。"
                        ]
                },
                "001110": {
                        "name": {
                                "zh": "泽山咸",
                                "en": "Influence (Xian)"
                        },
                        "explanation": {
                                "zh": "咸卦象征相互感应，艮少男悦兑少女。'咸亨利贞取女吉'，柔上而刚下，二气感应以相与。咸主感应，感而遂通。君子以虚受人。问事人际关系良好，感情融洽。",
                                "en": "Influence—pervasive, penetrating influence brings success. The mountain is receptive to the lake, creating mutual resonance. This hexagram indicates successful relationships based on genuine attraction and open receptivity. The superior person allows themselves to be influenced, remaining open and empty to receive."
                        },
                        "judgment": {
                                "zh": "亨，利贞，取女吉。",
                                "en": "Influence: success; perseverance furthers. Taking a maiden brings fortune."
                        },
                        "lines": [
                                "咸其拇。",
                                "咸其腓，凶，居吉。",
                                "咸其股，执其随，往吝。",
                                "贞吉悔亡。憧憧往来，朋从尔思。",
                                "咸其脢，无悔。",
                                "咸其辅，颊，舌。"
                        ]
                },
                "000110": {
                        "name": {
                                "zh": "泽地萃",
                                "en": "Gathering Together (Cui)"
                        },
                        "explanation": {
                                "zh": "萃卦象征聚集聚合，坤地承兑泽。'萃王假有庙，利见大人亨'。聚以正者吉，逆命者凶。萃如嗟如无攸利。问事人缘聚合，宜合作共事。",
                                "en": "Gathering Together—success through assembly. The Earth receives the lake, collecting waters. This hexagram indicates benefits that come through rightful assembly and congregation. The king approaches the temple—proper gathering around a center of value brings benefit through meeting with great persons."
                        },
                        "judgment": {
                                "zh": "亨。王假有庙，利见大人，亨，利贞。用大牲吉，利有攸往。",
                                "en": "Gathering: success. The king approaches the temple; it furthers to see the great person. Great offerings bring fortune."
                        },
                        "lines": [
                                "有孚不终，乃乱乃萃。若号，一握为笑，勿恤，往无咎。",
                                "引吉，无咎。孚乃利用禴。",
                                "萃如，嗟如，无攸利。往无咎，小吝。",
                                "大吉，无咎。",
                                "萃有位，无咎。匪孚，元永贞，悔亡。",
                                "赍咨涕洟，无咎。"
                        ]
                },
                "011101": {
                        "name": {
                                "zh": "火风鼎",
                                "en": "The Cauldron (Ding)"
                        },
                        "explanation": {
                                "zh": "鼎卦象征革新稳定，离火入巽风。'鼎元吉亨'，鼎象也，革故鼎新，鼎养神明。问事事业稳固，宜改革创新。",
                                "en": "The Cauldron—supreme good fortune. Fire enters the wood, cooking and transforming. This hexagram represents stability that contains transformation, like an ancient vessel used for sacred cooking. Nourishing the wise brings fundamental good fortune. A time for innovation within established structures."
                        },
                        "judgment": {
                                "zh": "元吉，亨。",
                                "en": "The Cauldron: supreme fortune; success."
                        },
                        "lines": [
                                "鼎颠趾，利出否。得妾以其子，无咎。",
                                "鼎有实，我仇有疾，不我能即，吉。",
                                "鼎耳革，其行塞，雉膏不食。方雨亏悔，终吉。",
                                "鼎折足，覆公餗，其形渥，凶。",
                                "鼎黄耳金铉，利贞。",
                                "鼎玉铉，大吉，无不利。"
                        ]
                },
                "010101": {
                        "name": {
                                "zh": "火水未济",
                                "en": "Before Completion (Wei Ji)"
                        },
                        "explanation": {
                                "zh": "未济卦象征事未成功，离火上浮。'未济亨，柔得中也'，小狐汔济未出中。问事需继续努力，终有成之机。思患豫防。",
                                "en": "Before Completion—success through continued effort. Fire rises over water, not yet completing its work. This hexagram indicates a time when the goal is in sight but not yet reached. Success comes through maintaining care and foresight to the very end, preventing complacency before completion."
                        },
                        "judgment": {
                                "zh": "亨。小狐汔济，濡其尾，无攸利。",
                                "en": "Before Completion: success. The little fox almost across wets its tail; nothing furthers."
                        },
                        "lines": [
                                "濡其尾，吝。",
                                "曳其轮，贞吉。",
                                "未济，征凶，利涉大川。",
                                "贞吉，悔亡。震用伐鬼方，三年有赏于大国。",
                                "贞吉，无悔。君子之光，有孚，吉。",
                                "有孚于饮酒，无咎。濡其首，有孚失是。"
                        ]
                },
                "001101": {
                        "name": {
                                "zh": "火山旅",
                                "en": "The Wanderer (Lu)"
                        },
                        "explanation": {
                                "zh": "旅卦象征行旅漂泊，离火照艮山。'旅小亨旅贞吉'，旅之时义大矣哉，慎用刑而不用狱。问事有变动之象，宜外出发展。",
                                "en": "The Wanderer—small success through perseverance. Fire on the mountain illuminates but does not remain. This hexagram indicates a time of being a stranger in strange lands. Success comes through maintaining correct behavior, careful use of resources, and respect for local customs while traveling or in transition."
                        },
                        "judgment": {
                                "zh": "小亨，旅贞吉。",
                                "en": "The Wanderer: small success; the wanderer's perseverance brings fortune."
                        },
                        "lines": [
                                "旅琐琐，斯其所取灾。",
                                "旅即次，怀其资，得童仆贞。",
                                "旅焚其次，丧其童仆，贞厉。",
                                "旅于处，得其资斧，我心不快。",
                                "射雉一矢亡，终以誉命。",
                                "鸟焚其巢，旅人先笑后号咷。丧牛于易，凶。"
                        ]
                },
                "000101": {
                        "name": {
                                "zh": "火地晋",
                                "en": "Progress (Jin)"
                        },
                        "explanation": {
                                "zh": "晋卦象征晋升进步，离明照坤地。'晋康侯用锡马蕃庶，昼日三接'。明出地上，顺而丽乎大明。问事事业将有进展，宜积极进取。",
                                "en": "Progress—success through advancement. The sun rises over the Earth, illuminating all. This hexagram indicates a time of rapid progress and recognition. The wise person is honored and rewarded multiple times. Success comes through clarifying and illuminating matters while maintaining harmonious relations."
                        },
                        "judgment": {
                                "zh": "康侯用锡马蕃庶，昼日三接。",
                                "en": "Progress: the noble lord is honored with many horses, received three times in a day."
                        },
                        "lines": [
                                "晋如，摧如，贞吉。罔孚，裕无咎。",
                                "晋如，愁如，贞吉。受兹介福，于其王母。",
                                "众允，悔亡。",
                                "晋如鼫鼠，贞厉。",
                                "悔亡，失得勿恤，往吉无不利。",
                                "晋其角，维用伐邑，厉吉无咎，贞吝。"
                        ]
                },
                "011100": {
                        "name": {
                                "zh": "雷风恒",
                                "en": "Duration (Heng)"
                        },
                        "explanation": {
                                "zh": "恒卦象征恒久稳定，巽风从震雷。'恒亨无咎，利贞利有攸往'，刚上柔下雷风恒。问事宜持之以恒，坚持不懈。",
                                "en": "Duration—success without blame through perseverance. Thunder and wind create lasting movement. This hexagram indicates the power of persistence and stable habits. Success comes through consistency, not sudden effort. Proper relationships are based on lasting principles that endure through all changes."
                        },
                        "judgment": {
                                "zh": "亨，无咎，利贞，利有攸往。",
                                "en": "Duration: success, no blame; perseverance furthers; it furthers to have somewhere to go."
                        },
                        "lines": [
                                "浚恒，贞凶，无攸利。",
                                "悔亡。",
                                "不恒其德，或承之羞，贞吝。",
                                "田无禽。",
                                "恒其德，贞，妇人吉，夫子凶。",
                                "振恒，凶。"
                        ]
                },
                "010100": {
                        "name": {
                                "zh": "雷水解",
                                "en": "Deliverance (Xie)"
                        },
                        "explanation": {
                                "zh": "解卦象征解除困难，坎险遇震雷。'解利西南无所往，其来复吉'，雷雨作解，险难消散。问事困难将解除，运势好转。",
                                "en": "Deliverance—benefit in the southwest; returning brings good fortune. Thunder and rain disperse difficulties. This hexagram indicates a time when obstacles are removed and dangers dissolve. Action is now appropriate to clear remaining debris from past difficulties. The Way opens again."
                        },
                        "judgment": {
                                "zh": "利西南。无所往，其来复吉。有攸往，夙吉。",
                                "en": "Deliverance: the southwest furthers. With nowhere to go, returning brings fortune; with somewhere to go, haste brings fortune."
                        },
                        "lines": [
                                "无咎。",
                                "田获三狐，得黄矢，贞吉。",
                                "负且乘，致寇至，贞吝。",
                                "解而拇，朋至斯孚。",
                                "君子维有解，吉，有孚于小人。",
                                "公用射隼于高墉之上，获之，无不利。"
                        ]
                },
                "001100": {
                        "name": {
                                "zh": "雷山小过",
                                "en": "Preponderance of the Small (Xiao Guo)"
                        },
                        "explanation": {
                                "zh": "小过卦象征小有过越，艮山止震雷。'小过亨利贞，可小事不可大事'。飞鸟遗之音，不宜上宜下。问事有小波折，但无大碍。",
                                "en": "Preponderance of the Small—success through humility in small matters. Thunder on the mountain—small excess. This hexagram advises attending to small things while avoiding great undertakings. Like a bird in flight leaving its call, do not try to soar too high. Success comes through modest aims and attention to detail."
                        },
                        "judgment": {
                                "zh": "亨，利贞。可小事，不可大事。飞鸟遗之音，不宜上，宜下，大吉。",
                                "en": "Small Preponderance: success; perseverance furthers. Small things may be done, not great things. The flying bird leaves its call: downward, not upward—great fortune."
                        },
                        "lines": [
                                "飞鸟以凶。",
                                "过其祖，遇其妣；不及其君，遇其臣，无咎。",
                                "弗过防之，从或戕之，凶。",
                                "无咎，弗过遇之。往厉必戒，勿用永贞。",
                                "密云不雨，自我西郊，公弋取彼在穴。",
                                "弗遇过之，飞鸟离之，凶，是谓灾眚。"
                        ]
                },
                "000100": {
                        "name": {
                                "zh": "雷地豫",
                                "en": "Enthusiasm (Yu)"
                        },
                        "explanation": {
                                "zh": "豫卦象征愉悦安乐，坤地从震雷。'豫利建侯行师'，雷出地奋，先王以作乐。问事心情愉悦，宜做好准备。",
                                "en": "Enthusiasm—benefit through preparation and leadership. Thunder emerges from the Earth, energizing all things. This hexagram indicates a time of joy and enthusiasm that supports productive action. The ancient kings used music to honor virtue. Proper preparation and timing lead to success."
                        },
                        "judgment": {
                                "zh": "利建侯行师。",
                                "en": "Enthusiasm: it furthers to appoint helpers and set armies marching."
                        },
                        "lines": [
                                "鸣豫，凶。",
                                "介于石，不终日，贞吉。",
                                "盱豫，悔。迟有悔。",
                                "由豫，大有得。勿疑，朋盍簪。",
                                "贞疾，恒不死。",
                                "冥豫，成有渝，无咎。"
                        ]
                },
                "011011": {
                        "name": {
                                "zh": "巽为风",
                                "en": "The Gentle (Xun)"
                        },
                        "explanation": {
                                "zh": "巽卦象征顺从进入，巽风相重。'巽小亨，利有攸往利见大人'，随风巽君子以申命行事。问事宜柔顺行事，循序渐进。",
                                "en": "The Gentle—small success through penetration. Wind follows wind, penetrating everywhere. This hexagram indicates the power of gentle, persistent influence. The superior person spreads their commands through gentle, repeated instruction. Success comes through gradual, flexible advance rather than force."
                        },
                        "judgment": {
                                "zh": "小亨，利有攸往，利见大人。",
                                "en": "The Gentle: small success; it furthers to undertake and to see the great person."
                        },
                        "lines": [
                                "进退，利武人之贞。",
                                "巽在床下，用史巫纷若，吉无咎。",
                                "频巽，吝。",
                                "悔亡，田获三品。",
                                "贞吉悔亡，无不利。无初有终。先庚三日，后庚三日，吉。",
                                "巽在床下，丧其资斧，贞凶。"
                        ]
                },
                "010011": {
                        "name": {
                                "zh": "风水涣",
                                "en": "Dispersion (Huan)"
                        },
                        "explanation": {
                                "zh": "涣卦象征涣散化解，坎水入巽风。'涣亨，王假有庙利涉大川'。问事困难将化解，前景好转。聚者散之，涣者聚之。",
                                "en": "Dispersion—success through dissolution. Wind over water disperses ice and rigidity. This hexagram indicates a time when rigidity dissolves and obstacles disperse. The king approaches the temple—reconnecting with source and spirit helps dissolve difficulties. Crossing great waters is beneficial."
                        },
                        "judgment": {
                                "zh": "亨。王假有庙，利涉大川，利贞。",
                                "en": "Dispersion: success. The king approaches the temple; it furthers to cross the great water."
                        },
                        "lines": [
                                "用拯马壮，吉。",
                                "涣奔其机，悔亡。",
                                "涣其躬，无悔。",
                                "涣其群，元吉。涣有丘，匪夷所思。",
                                "涣汗其大号，涣王居，无咎。",
                                "涣其血，去逖出，无咎。"
                        ]
                },
                "001011": {
                        "name": {
                                "zh": "风山渐",
                                "en": "Development (Jian)"
                        },
                        "explanation": {
                                "zh": "渐卦象征循序渐进，艮山止巽风。'渐女归吉利贞'，渐进也，进以正可以正邦。问事宜循序渐进，不可急躁。",
                                "en": "Development—success through gradual progress. Wind on the mountain advances tree by tree. This hexagram indicates the beauty of gradual, natural progression, like a maiden's proper marriage. Do not force progress; allow things to unfold in their proper time. Success comes through steady, correct advance."
                        },
                        "judgment": {
                                "zh": "女归吉，利贞。",
                                "en": "Development: the maiden's marriage brings fortune; perseverance furthers."
                        },
                        "lines": [
                                "鸿渐于干，小子厉，有言，无咎。",
                                "鸿渐于磐，饮食衎衎，吉。",
                                "鸿渐于陆，夫征不复，妇孕不育，凶。利御寇。",
                                "鸿渐于木，或得其桷，无咎。",
                                "鸿渐于陵，妇三岁不孕，终莫之胜，吉。",
                                "鸿渐于陆，其羽可用为仪，吉。"
                        ]
                },
                "000011": {
                        "name": {
                                "zh": "风地观",
                                "en": "Contemplation (View) (Guan)"
                        },
                        "explanation": {
                                "zh": "观卦象征观察审视，坤地从巽风。'观盥而不荐，有孚颙若'。神道设教，圣人以神道设教而天下服。问事需冷静观察形势，不可轻举妄动。",
                                "en": "Contemplation—success through observation. Wind across the Earth reaches everywhere. This hexagram indicates a time for careful observation and consideration before action. The ritual is contemplated but not yet performed. Through calm, respectful observation, one gains the insight needed for right action."
                        },
                        "judgment": {
                                "zh": "盥而不荐，有孚颙若。",
                                "en": "Contemplation: the ablution done, the offering not yet made; sincerity, grave and reverent."
                        },
                        "lines": [
                                "童观，小人无咎，君子吝。",
                                "窥观，利女贞。",
                                "观我生，进退。",
                                "观国之光，利用宾于王。",
                                "观我生，君子无咎。",
                                "观其生，君子无咎。"
                        ]
                },
                "011010": {
                        "name": {
                                "zh": "水风井",
                                "en": "The Well (Jing)"
                        },
                        "explanation": {
                                "zh": "井卦象征汲养不变，巽木入坎水。'井改邑不改井，无丧无得'，井养而不穷。问事基础稳固，宜守成。",
                                "en": "The Well—fundamental resource that does not change. Water over wood draws up the well's resources. This hexagram indicates stable, enduring resources that nourish all. Though towns may change, the well remains. Maintain and care for fundamental resources; they provide inexhaustible benefit."
                        },
                        "judgment": {
                                "zh": "改邑不改井，无丧无得，往来井井。汔至，亦未繘井，羸其瓶，凶。",
                                "en": "The Well: the town may change, the well does not. Almost reached, yet the rope falls short; breaking the jug brings misfortune."
                        },
                        "lines": [
                                "井泥不食，旧井无禽。",
                                "井谷射鲋，瓮敝漏。",
                                "井渫不食，为我心恻。可用汲，王明，并受其福。",
                                "井甃，无咎。",
                                "井冽，寒泉食。",
                                "井收勿幕，有孚元吉。"
                        ]
                },
                "010010": {
                        "name": {
                                "zh": "坎为水",
                                "en": "The Abysmal (Kan)"
                        },
                        "explanation": {
                                "zh": "坎卦象征险陷困难，坎水相重。'习坎有孚维心亨，行有尚'，水流而不盈行险而不失其信。问事正处于困难时期，需要谨慎。",
                                "en": "The Abysmal—success through repeated challenge. Water doubles itself, flowing through depths. This hexagram indicates times of danger and difficulty that require faith and persistence. While immersed in difficulty, maintain heart and trust. The water flows on, eventually reaching its goal."
                        },
                        "judgment": {
                                "zh": "习坎，有孚，维心亨，行有尚。",
                                "en": "The Abysmal: repeated danger; with sincerity the heart succeeds; action is esteemed."
                        },
                        "lines": [
                                "习坎，入于坎窞，凶。",
                                "坎有险，求小得。",
                                "来之坎坎，险且枕，入于坎窞，勿用。",
                                "樽酒簋贰，用缶，纳约自牖，终无咎。",
                                "坎不盈，祗既平，无咎。",
                                "系用徽纆，寘于丛棘，三岁不得，凶。"
                        ]
                },
                "001010": {
                        "name": {
                                "zh": "水山蹇",
                                "en": "Obstruction (Jian)"
                        },
                        "explanation": {
                                "zh": "蹇卦象征艰难险阻，艮山阻坎水。'蹇利西南不利东北'，见险而能止知矣哉。问事前行受阻，需要谨慎。",
                                "en": "Obstruction—benefit in the southwest, not in the northeast. Water on the mountain is blocked. This hexagram indicates a time when progress is difficult and dangerous. It is wise to stop when seeing danger. Retreat to favorable conditions rather than forcing advance against obstruction."
                        },
                        "judgment": {
                                "zh": "利西南，不利东北。利见大人，贞吉。",
                                "en": "Obstruction: the southwest furthers, the northeast does not. It furthers to see the great person."
                        },
                        "lines": [
                                "往蹇，来誉。",
                                "王臣蹇蹇，匪躬之故。",
                                "往蹇来反。",
                                "往蹇来连。",
                                "大蹇朋来。",
                                "往蹇来硕，吉。利见大人。"
                        ]
                },
                "000010": {
                        "name": {
                                "zh": "水地比",
                                "en": "Holding Together (Bi)"
                        },
                        "explanation": {
                                "zh": "比卦象征亲近团结，坤地从坎水。'比吉，原筮元永贞，不宁方来'。比以辅为主，先迷后得主。问事宜与人亲近，团结合作。",
                                "en": "Holding Together—success through alliance. Water on Earth flows together, uniting all. This hexagram indicates benefits that come through proper association and loyalty. The insecure seek connection. Success comes through finding the right leader or group and holding together with them."
                        },
                        "judgment": {
                                "zh": "吉。原筮元永贞，无咎。不宁方来，后夫凶。",
                                "en": "Holding Together: fortune. Sublime, enduring perseverance, no blame. The latecomer meets misfortune."
                        },
                        "lines": [
                                "有孚比之，无咎。有孚盈缶，终来有他，吉。",
                                "比之自内，贞吉。",
                                "比之匪人。",
                                "外比之，贞吉。",
                                "显比，王用三驱，失前禽，邑人不诫，吉。",
                                "比之无首，凶。"
                        ]
                },
                "011001": {
                        "name": {
                                "zh": "山风蛊",
                                "en": "Work on What Has Been Spoiled (Gu)"
                        },
                        "explanation": {
                                "zh": "蛊卦象征积弊改革，巽风入艮山。'蛊元亨利涉大川，先甲三日后甲三日'。蛊因人兴必有所以蛊。问事需革除积弊，改革创新。",
                                "en": "Work on What Has Been Spoiled—supreme success. Wind in the mountains disperses decay. This hexagram indicates a time when accumulated problems must be addressed. Reform and renovation are necessary. Calculate the proper timing (three days before and after) for instituting change."
                        },
                        "judgment": {
                                "zh": "元亨，利涉大川。先甲三日，后甲三日。",
                                "en": "Work on the Spoiled: sublime success; it furthers to cross the great water. Three days before, three days after the turning point."
                        },
                        "lines": [
                                "干父之蛊，有子，考无咎，厉终吉。",
                                "干母之蛊，不可贞。",
                                "干父之蛊，小有悔，无大咎。",
                                "裕父之蛊，往见吝。",
                                "干父之蛊，用誉。",
                                "不事王侯，高尚其事。"
                        ]
                },
                "010001": {
                        "name": {
                                "zh": "山水蒙",
                                "en": "Youful Folly (Meng)"
                        },
                        "explanation": {
                                "zh": "蒙卦象征蒙昧启蒙，坎水浸艮山。'蒙亨，匪我求童蒙童蒙求我'。蒙以养正圣功也。问事需学习求教，启蒙之时。",
                                "en": "Youful Folly—success through education. Water at the foot of the mountain forms a spring. This hexagram indicates a time of inexperience that requires teaching. The teacher does not seek the student; the student seeks the teacher. Proper early education establishes the foundation for future wisdom."
                        },
                        "judgment": {
                                "zh": "亨。匪我求童蒙，童蒙求我。初筮告，再三渎，渎则不告。利贞。",
                                "en": "Youthful Folly: success. The young fool seeks me. At the first oracle I inform; repeated questioning informs no more. Perseverance furthers."
                        },
                        "lines": [
                                "发蒙，利用刑人，用说桎梏，以往吝。",
                                "包蒙吉，纳妇吉，子克家。",
                                "勿用取女，见金夫，不有躬，无攸利。",
                                "困蒙，吝。",
                                "童蒙，吉。",
                                "击蒙，不利为寇，利御寇。"
                        ]
                },
                "001001": {
                        "name": {
                                "zh": "艮为山",
                                "en": "Keeping Still (Gen)"
                        },
                        "explanation": {
                                "zh": "艮卦象征静止停止，艮山相重。'艮其背不获其身，行其庭不见其人'。止于所当止，动静不失其时。问事宜停止不前，等待时机。",
                                "en": "Keeping Still—peace through proper stopping. The mountain doubles itself, perfectly still. This hexagram indicates the necessity of keeping still and maintaining proper boundaries. Stop at the right place at the right time. When action is not appropriate, maintaining stillness brings peace."
                        },
                        "judgment": {
                                "zh": "艮其背，不获其身，行其庭，不见其人，无咎。",
                                "en": "Keeping Still: keeping the back so still one feels no body; walking the courtyard seeing no one. No blame."
                        },
                        "lines": [
                                "艮其趾，无咎，利永贞。",
                                "艮其腓，不拯其随，其心不快。",
                                "艮其限，列其夤，厉薰心。",
                                "艮其身，无咎。",
                                "艮其辅，言有序，悔亡。",
                                "敦艮，吉。"
                        ]
                },
                "000001": {
                        "name": {
                                "zh": "山地剥",
                                "en": "Splitting Apart (Bo)"
                        },
                        "explanation": {
                                "zh": "剥卦象征剥落衰败，坤地承艮山。'剥不利有攸往'，剥以辨幽明消不可不盈。问事运势下滑，宜保守谨慎。",
                                "en": "Splitting Apart—no benefit in movement. The mountain rests on the Earth, being gradually undermined. This hexagram indicates a time when inferior forces are rising and superior forces are receding. Do not try to advance; guard what remains and wait for the turning point. The dark returns to the light."
                        },

        function initAudio() {
            if (!audioContext) {

            }
            if (audioContext && audioContext.state === 'suspended') audioContext.resume();

        function playBambooSound(isLeftHand, intensity = 1) {
            if (!settings.sound || !audioContext) return;
            const now = audioContext.currentTime;
            const baseFreq = isLeftHand ? 520 : 720;
            const osc1 = audioContext.createOscillator();
            const gain1 = audioContext.createGain();
            osc1.type = 'sine';
            osc1.frequency.setValueAtTime(baseFreq, now);
            osc1.frequency.exponentialRampToValueAtTime(baseFreq * 0.6, now + 0.04);
            gain1.gain.setValueAtTime(0, now);
            gain1.gain.linearRampToValueAtTime(0.18 * intensity, now + 0.002);
            gain1.gain.exponentialRampToValueAtTime(0.001, now + 0.045);
            osc1.connect(gain1); gain1.connect(audioContext.destination);
            osc1.start(now); osc1.stop(now + 0.05);

            const osc2 = audioContext.createOscillator();
            const gain2 = audioContext.createGain();
            const filter2 = audioContext.createBiquadFilter();
            osc2.type = 'triangle';
            osc2.frequency.setValueAtTime(baseFreq * 1.8, now);
            filter2.type = 'highpass';
            filter2.frequency.setValueAtTime(800, now);
            filter2.Q.setValueAtTime(1.5, now);
            gain2.gain.setValueAtTime(0, now);
            gain2.gain.linearRampToValueAtTime(0.08 * intensity, now + 0.001);
            gain2.gain.exponentialRampToValueAtTime(0.001, now + 0.025);
            osc2.connect(filter2); filter2.connect(gain2); gain2.connect(audioContext.destination);
            osc2.start(now); osc2.stop(now + 0.03);
        }
        function playRevealSound() {
            if (!settings.sound || !audioContext) return;
            const now = audioContext.currentTime;
            const osc = audioContext.createOscillator();
            const gain = audioContext.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(880, now);
            gain.gain.setValueAtTime(0, now);
            gain.gain.linearRampToValueAtTime(0.06, now + 0.01);
            gain.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
            osc.connect(gain); gain.connect(audioContext.destination);
            osc.start(now); osc.stop(now + 0.32);
        }

        // splitValue = 受命之手中的数量（左/右堆取决于 currentHand）
        function renderSplit() {

        // ==================== 天意模式摇筮 ====================
        // 使用 crypto.getRandomValues（CSPRNG）：随机种子来自操作系统内核熵池，
        // 由硬件噪声（中断、时钟抖动等）不断搅入，不可预测、不可复现；
        // 拒绝采样消除模偏差，保证 1-48 每根竹签等概率。
        function secureRandomInt(min, max) {
            const range = max - min + 1;
            const MAX_UINT32 = 0x100000000;
            const limit = MAX_UINT32 - (MAX_UINT32 % range);
            const buf = new Uint32Array(1);
            let x;
            do {
                window.crypto.getRandomValues(buf);
                x = buf[0];
            } while (x >= limit);
            return min + (x % range);
        }
        let fateAnimating = false;

            const btn = $('confirmBtn');
            btn.disabled = true;
            let ticks = 0;
            const totalTicks = 22;   // 约 2.2 秒
            const timer = setInterval(() => {
                ticks++;
                splitValue = secureRandomInt(1, TOTAL_STALKS - 1); // 1..48，安全随机源
                renderSplit();
                playBambooSound(currentHand === 'left', 0.5);
                if (ticks >= totalTicks) {
                    clearInterval(timer);
                    stalksRow.classList.remove('shaking');
                    fateAnimating = false;
                    fateSettled = true;
                    btn.disabled = false;
                    btn.textContent = t('confirmBtn');
                    vibrate();
                    playBambooSound(currentHand === 'left', 1);
                }
            }, 100);
        }

        // ==================== 呼吸静心引导 ====================
        function runBreathGuide(onDone) {
            if (!settings.breath) { onDone(); return; }
            const overlay = $('breathOverlay');
            const circle = $('breathCircle');
            const text = $('breathText');
            overlay.hidden = false;
            let phase = 0;  // 0 吸 1 呼
            let rounds = 0;
            const totalRounds = 3;
            function nextPhase() {
                if (rounds >= totalRounds) { finish(); return; }
                if (phase === 0) {
                    text.textContent = t('breathIn');
                    circle.classList.add('inhale');
                } else {
                    text.textContent = t('breathOut');
                    circle.classList.remove('inhale');
                    rounds++;
                }
                phase = 1 - phase;
                breathTimer = setTimeout(nextPhase, 3800);
            }
            function finish() {
                clearTimeout(breathTimer);
                overlay.hidden = true;
                circle.classList.remove('inhale');
                $('breathSkip').removeEventListener('click', finish);
                onDone();
            }
            $('breathSkip').addEventListener('click', finish);
            nextPhase();
        }

        function startDivination() {

            const deathPattern = /(生死|寿命|阳寿|死亡|临终|还能活|活多久|几岁死|何时死|deadline of life|life ?span|death|die|dying)/i;

        // ==================== 卦象计算 ====================
        function benGuaCode() { return baguaCode[xiaGua] + baguaCode[shangGua]; }

            const c = benGuaCode().split('');

        }
        function cuoGuaCode(code) {
            return code.split('').map(b => b === '1' ? '0' : '1').join('');
        }
        function zongGuaCode(code) {
            return code.split('').reverse().join('');
        }
        function huGuaCode(code) {
            // 互卦：二三四爻为下卦，三四五爻为上卦
            return code[1] + code[2] + code[3] + code[2] + code[3] + code[4];
        }

        // ==================== 结果页 ====================
        function buildYaoLines(container, code, dongIdx, animate) {
            container.innerHTML = '';
            const rows = [];
            for (let i = 0; i <= 5; i++) {   // column-reverse：先插入的初爻显示在最下方，上爻在最上方
                const isYang = code[i] === '1';

                num.className = 'yao-number';
                num.textContent = yaoName[currentLang][i];
