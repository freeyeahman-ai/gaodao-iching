                if (i + 1 === dongIdx) line.classList.add('dong');
                row.appendChild(num);
                row.appendChild(line);
                container.appendChild(row);
                rows.push(row);
            }
            // 逐爻揭示：初爻（数组末尾）先出
            if (animate) {
                rows.forEach((row, idx) => {   // 初爻先出，上爻最后
                    setTimeout(() => {
                        row.classList.add('on');
                        playRevealSound();
                    }, 350 + idx * 260);
                });
                return 350 + 6 * 260;
            } else {
                rows.forEach(row => row.classList.add('on'));
                return 0;
            }
        }

        function trigramSymbolLine(code) {
            const lower = code.slice(0, 3), upper = code.slice(3, 6);
            const idxOf = (c) => parseInt(Object.keys(baguaCode).find(k => baguaCode[k] === c), 10);
            const li = idxOf(lower), ui = idxOf(upper);
            if (currentLang === 'zh') {
                return `${baguaSymbol[ui]} ${baguaName.zh[ui]}上 · ${baguaSymbol[li]} ${baguaName.zh[li]}下`;
            }
            return `${baguaName.en[ui]} above · ${baguaName.en[li]} below`;
        }

        function showFinalResult(fromRecord, noAnimate) {
            const rec = fromRecord || null;
            const benCode = rec ? rec.benGuaCode : benGuaCode();
            const bianCode = rec ? rec.bianGuaCode : bianGuaCode();
            const dy = rec ? rec.dongYao : dongYao;
            const ben = guaInfo(benCode);
            const bian = guaInfo(bianCode);

            $('divinationView').hidden = true;
            $('homeView').hidden = true;
            $('resultView').hidden = false;
            window.scrollTo({ top: 0, behavior: 'smooth' });

            // 时间
            if (rec) {
                $('timeBeijing').textContent = rec.timeBeijing || rec.time || '-';
                $('timeSolar').textContent = rec.trueSolarTime || '-';
                $('timeDizhi').textContent = rec.dizhi || '-';
                $('locationInfo').textContent = '';
                $('locationError').hidden = true;
            } else {
                displayDivinationTime();
            }

            $('resultQuestion').textContent = rec ? rec.question : currentQuestion;
            $('benGuaName').textContent = ben.name[currentLang];
            $('bianGuaName').textContent = bian.name[currentLang];
            $('benGuaSymbol').textContent = trigramSymbolLine(benCode);
            $('bianGuaSymbol').textContent = trigramSymbolLine(bianCode);

            // 动爻
            $('dongyaoTitle').textContent = t('movingYaoTitle');
            $('dongyaoContent').textContent = yaoName[currentLang][dy - 1];
            const yaociPrefix = currentLang === 'zh'
                ? `${yaoTitleZh[dy - 1]}${benCode[dy - 1] === '1' ? '九' : '六'}：`
                : '';
            $('dongyaoYaoci').textContent = yaociPrefix + ben.lines[dy - 1];
            $('dongyaoMeaning').textContent = dongyaoMeanings[currentLang][dy];

            // 卦辞与解析
            $('benJudgment').innerHTML = `<span class="cq-tag">${t('judgmentLabel')}</span>${ben.judgment[currentLang]}`;
            $('benGuaExplain').textContent = ben.explanation[currentLang];
            $('bianJudgment').innerHTML = `<span class="cq-tag">${t('judgmentLabel')}</span>${bian.judgment[currentLang]}`;
            $('bianGuaExplain').textContent = bian.explanation[currentLang];

            $('methodInfo').textContent = t('calcNote');

            // 动画：先本卦后变卦，再淡入文字区（重渲染时跳过动画）
            const sections = ['dongyaoBox', 'benGuaSection', 'bianGuaSection'];
            if (noAnimate) {
                buildYaoLines($('benGuaLines'), benCode, dy, false);
                buildYaoLines($('bianGuaLines'), bianCode, 0, false);
                sections.forEach(id => $(id).style.opacity = 1);
            } else {
                const durBen = buildYaoLines($('benGuaLines'), benCode, dy, true);
                sections.forEach(id => $(id).style.opacity = 0);
                setTimeout(() => {
                    const durBian = buildYaoLines($('bianGuaLines'), bianCode, 0, true);
                    setTimeout(() => {
                        sections.forEach((id, i) => {
                            setTimeout(() => { $(id).style.opacity = 1; }, i * 220);
                        });
                    }, durBian + 150);
                }, durBen + 150);
            }

            if (!rec) {
                saveRecord(benCode, bianCode, dy, ben, bian);
            }
            currentTimeData = currentTimeData || null;
            window.__lastResult = {
                benCode, bianCode, dongYao: dy,
                benName: ben.name, bianName: bian.name,
                benJudgment: ben.judgment, bianJudgment: bian.judgment,
                benExplain: ben.explanation, bianExplain: bian.explanation,
                yaoci: ben.lines[dy - 1],
                question: rec ? rec.question : currentQuestion,
                timeBeijing: rec ? (rec.timeBeijing || rec.time) : ($('timeBeijing').textContent || ''),
                trueSolar: rec
                    ? { trueSolarTime: rec.trueSolarTime || '', dizhi: rec.dizhi || '' }
                    : (currentTimeData || { trueSolarTime: $('timeBeijing').textContent, dizhi: '' }),
            };
        }

        // ==================== 真太阳时 ====================
        function getEquationOfTime(date) {
            const start = new Date(date.getFullYear(), 0, 1);
            const dayOfYear = Math.floor((date - start) / 86400000) + 1;
            const B = (360 / 365) * (dayOfYear - 81);
            const rad = Math.PI / 180;
            return 9.87 * Math.sin(2 * B * rad) - 7.53 * Math.cos(B * rad) - 1.5 * Math.sin(B * rad);
        }
        function getDizhi(hour) {
            return dizhiName[Math.floor(((hour + 1) % 24) / 2)];
        }
        function formatDateTime(date) {
            const p = (n) => String(n).padStart(2, '0');
            return `${date.getFullYear()}-${p(date.getMonth() + 1)}-${p(date.getDate())} ${p(date.getHours())}:${p(date.getMinutes())}:${p(date.getSeconds())}`;
        }
        function displayDivinationTime() {
            const now = new Date();
            $('timeBeijing').textContent = formatDateTime(now);
            $('timeSolar').textContent = '…';
            $('timeDizhi').textContent = '…';
            $('locationInfo').textContent = '';
            $('locationError').hidden = true;
            currentTimeData = null;

            const fallback = () => {
                $('timeSolar').textContent = formatDateTime(now);
                $('timeDizhi').textContent = getDizhi(now.getHours()) + (currentLang === 'en' ? ' Hour' : '时');
                $('locationError').hidden = false;
                $('locationError').textContent = t('locationError');
                currentTimeData = {
                    trueSolarTime: formatDateTime(now),
                    dizhi: getDizhi(now.getHours()) + (currentLang === 'en' ? ' Hour' : '时')
                };
            };
            if (!navigator.geolocation) { fallback(); return; }
            navigator.geolocation.getCurrentPosition(
                (pos) => {
                    const longitude = pos.coords.longitude;
                    const totalCorrection = (longitude - 120) * 4 + getEquationOfTime(now);
                    const tst = new Date(now.getTime() + totalCorrection * 60000);
                    const dizhi = getDizhi(tst.getHours()) + (currentLang === 'en' ? ' Hour' : '时');
                    $('timeSolar').textContent = formatDateTime(tst);
                    $('timeDizhi').textContent = dizhi;
                    const sign = totalCorrection > 0 ? '+' : '';
                    $('locationInfo').textContent = `${t('longitude')} ${longitude.toFixed(2)}° · ${t('correction')} ${sign}${totalCorrection.toFixed(1)} ${t('minutes')}`;
                    currentTimeData = { trueSolarTime: formatDateTime(tst), dizhi };
                },
                () => fallback(),
                { enableHighAccuracy: false, timeout: 8000, maximumAge: 300000 }
            );
        }

        // ==================== 历史记录 ====================
        const HISTORY_KEY = 'gaodao_divination_history_v2';
        function loadRecords() {
            try { return JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]'); }
            catch (e) { return []; }
        }
        function saveRecord(benCode, bianCode, dy, ben, bian) {
            const records = loadRecords();
            const bjTime = $('timeBeijing').textContent;
            const now = new Date();
            records.unshift({
                id: Date.now(),
                timestamp: Date.now(),
                question: currentQuestion,
                benGuaCode: benCode,
                bianGuaCode: bianCode,
                dongYao: dy,
                benGuaName: ben.name.zh,
                bianGuaName: bian.name.zh,
                timeBeijing: bjTime,
                trueSolarTime: currentTimeData ? currentTimeData.trueSolarTime : bjTime,
                dizhi: currentTimeData ? currentTimeData.dizhi : (getDizhi(now.getHours()) + (currentLang === 'en' ? ' Hour' : '时')),
                lang: currentLang
            });
            localStorage.setItem(HISTORY_KEY, JSON.stringify(records.slice(0, 100)));
            updateTodayHint();
        }
        function renderHistoryList(filter) {
            const records = loadRecords();
            const kw = (filter || '').trim().toLowerCase();
            const list = records.filter(r => {
                if (!kw) return true;
                const ben = guaInfo(r.benGuaCode);
                const bian = guaInfo(r.bianGuaCode);
                return (r.question || '').toLowerCase().includes(kw)
                    || (ben && (ben.name.zh.includes(kw) || ben.name.en.toLowerCase().includes(kw)))
                    || (bian && (bian.name.zh.includes(kw) || bian.name.en.toLowerCase().includes(kw)));
            });
            $('historyStats').textContent = t('historyStatsText', { n: records.length });
            const box = $('historyList');
            box.innerHTML = '';
            if (list.length === 0) {
                box.innerHTML = `<div class="history-empty">${kw ? t('historyEmptySearch') : t('toastNoHistory')}</div>`;
                return;
            }
            list.forEach(r => {
                const ben = guaInfo(r.benGuaCode);
                const bian = guaInfo(r.bianGuaCode);
                const item = document.createElement('div');
                item.className = 'history-item';
                const d = new Date(r.timestamp);
                const dateStr = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')} ${String(d.getHours()).padStart(2, '0')}:${String(d.getMinutes()).padStart(2, '0')}`;
                item.innerHTML = `
                    <div class="hi-top">
                        <div class="hi-gua">${ben ? ben.name[currentLang] : ''} → ${bian ? bian.name[currentLang] : ''}</div>
                        <div class="hi-date">${dateStr}</div>
                    </div>
                    <div class="hi-q">${(r.question || '').replace(/</g, '&lt;')}</div>
                    <div class="hi-bottom">
                        <div class="hi-meta">${t('movingYaoLabel')} ${yaoName[currentLang][r.dongYao - 1]}</div>
                        <button class="hi-del" data-id="${r.id}">${t('deleteBtn')}</button>
                    </div>`;
                item.addEventListener('click', (e) => {
                    if (e.target.classList.contains('hi-del')) return;
                    $('historyModal').hidden = true;
                    showFinalResult(r);
                });
                item.querySelector('.hi-del').addEventListener('click', (e) => {
                    e.stopPropagation();
                    const id = parseInt(e.target.dataset.id, 10);
                    localStorage.setItem(HISTORY_KEY, JSON.stringify(loadRecords().filter(x => x.id !== id)));
                    showToast(t('toastDeleted'));
                    renderHistoryList($('historySearch').value);
                    updateTodayHint();
                });
                box.appendChild(item);
            });
        }
        function exportHistory() {
            const records = loadRecords();
            if (records.length === 0) { showToast(t('toastNoHistory')); return; }
            const blob = new Blob([JSON.stringify(records, null, 2)], { type: 'application/json' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'divination_history_' + new Date().toISOString().slice(0, 10) + '.json';
            a.click();
            URL.revokeObjectURL(a.href);
            showToast(t('toastExported'));
        }

        // ==================== 分享卡片 ====================
        function drawShareCard() {
            const R = window.__lastResult;
            if (!R) return;
            const cv = $('shareCanvas');
            const ctx = cv.getContext('2d');
            const W = cv.width, H = cv.height;
            const isZh = currentLang === 'zh';

            // 背景
            const bg = ctx.createLinearGradient(0, 0, W, H);
            bg.addColorStop(0, '#1a1a2e');
            bg.addColorStop(0.5, '#16213e');
            bg.addColorStop(1, '#0f3460');
            ctx.fillStyle = bg;
            ctx.fillRect(0, 0, W, H);

            // 金框
            ctx.strokeStyle = '#c9a227';
            ctx.lineWidth = 3;
            ctx.strokeRect(28, 28, W - 56, H - 56);
            ctx.lineWidth = 1;
            ctx.strokeRect(40, 40, W - 80, H - 80);

            const center = W / 2;
            ctx.textAlign = 'center';
            // 标题
            ctx.fillStyle = '#c9a227';
            ctx.font = 'bold 44px "Noto Serif SC", "SimSun", serif';
            ctx.fillText(isZh ? '高岛易断略筮法' : "Takashima's Divination", center, 120);
            ctx.font = '20px "Noto Serif SC", "SimSun", serif';
            ctx.fillStyle = '#a0a0a0';
            ctx.fillText(isZh ? '滑动分堆 · 诚心起卦' : 'Slide to Divide · Sincere Inquiry', center, 158);

            // 所问
            ctx.font = '26px "Noto Serif SC", "SimSun", serif';
            ctx.fillStyle = '#e8e8e8';
            const q = (isZh ? '【问】' : '[Q] ') + (R.question || (isZh ? '（未填写）' : '(blank)'));
            ctx.fillText(q.length > 24 ? q.slice(0, 24) + '…' : q, center, 225);
            ctx.font = '18px "Noto Serif SC", "SimSun", serif';
            ctx.fillStyle = '#888888';
            ctx.fillText(R.timeBeijing || '', center, 258);

            // 画卦
            function drawGua(cx, topY, code, name, dongIdx, label) {
                ctx.font = '20px "Noto Serif SC", "SimSun", serif';
                ctx.fillStyle = '#c9a227';
                ctx.fillText(label, cx, topY);
                ctx.font = 'bold 30px "Noto Serif SC", "SimSun", serif';
                ctx.fillStyle = '#ffffff';
                ctx.fillText(name, cx, topY + 40);
                const lineW = 130, lineH = 12, gap = 18;
                for (let i = 5; i >= 0; i--) {
                    const y = topY + 70 + (5 - i) * (lineH + gap);
                    const isYang = code[i] === '1';
                    const isDong = (i + 1) === dongIdx;
                    ctx.fillStyle = isYang ? '#e8d179' : '#999999';
                    if (isYang) {
                        ctx.fillRect(cx - lineW / 2, y, lineW, lineH);
                    } else {
                        ctx.fillRect(cx - lineW / 2, y, lineW / 2 - 8, lineH);
                        ctx.fillRect(cx + 8, y, lineW / 2 - 8, lineH);
                    }
                    if (isDong) {
                        ctx.strokeStyle = '#ff6666';
                        ctx.lineWidth = 2;
                        ctx.strokeRect(cx - lineW / 2 - 6, y - 5, lineW + 12, lineH + 10);
                    }
                }
            }
            drawGua(center - 180, 330, R.benCode, R.benName[currentLang], R.dongYao, isZh ? '本卦' : 'Primary');
            drawGua(center + 180, 330, R.bianCode, R.bianName[currentLang], 0, isZh ? '变卦' : 'Changed');
            // 箭头
            ctx.font = '40px serif';
            ctx.fillStyle = '#c9a227';
            ctx.fillText('→', center, 480);

            // 动爻爻辞
            const dy = R.dongYao;
            ctx.font = 'bold 24px "Noto Serif SC", "SimSun", serif';
            ctx.fillStyle = '#ff8888';
            ctx.fillText((isZh ? '动爻 · ' : 'Moving Line · ') + yaoName[currentLang][dy - 1], center, 620);
            ctx.font = '22px "Noto Serif SC", "SimSun", serif';
            ctx.fillStyle = '#e8d179';
            wrapText(ctx, R.yaoci, center, 660, W - 180, 34);

            // 卦辞
            ctx.font = '20px "Noto Serif SC", "SimSun", serif';
            ctx.fillStyle = '#c9a227';
            ctx.fillText(isZh ? '卦辞' : 'Judgment', center, 800);
            ctx.fillStyle = '#d4d4d4';
            const jdEndY = wrapText(ctx, R.benJudgment[currentLang], center, 838, W - 180, 32);

            // 页脚
            ctx.font = '16px "Noto Serif SC", "SimSun", serif';
            ctx.fillStyle = '#666666';
            ctx.fillText(isZh ? '心诚则灵 · 一事不二占 · 结果仅供参考' : 'Sincerity brings clarity · For reference only', center, H - 70);

            cv.toBlob((blob) => {
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = (isZh ? '卦象卡片_' : 'hexagram_card_') + Date.now() + '.png';
                a.click();
                URL.revokeObjectURL(a.href);
                showToast(t('shareCardSaved'));
            }, 'image/png');
        }
        function wrapText(ctx, text, x, y, maxWidth, lineHeight) {
            // 避头尾：行首不出现标点
            const noLineStart = '。，、；：？！）】」』…—·';
            let line = '', yy = y;
            for (const ch of text) {
                if (ctx.measureText(line + ch).width > maxWidth && line) {
                    if (noLineStart.includes(ch)) {
                        line += ch;   // 标点跟在前一行末尾
                        ctx.fillText(line, x, yy);
                        line = '';
                        yy += lineHeight;
                        continue;
                    }
                    ctx.fillText(line, x, yy);
                    line = ch;
                    yy += lineHeight;
                } else {
                    line += ch;
                }
            }
            if (line) { ctx.fillText(line, x, yy); yy += lineHeight; }
            return yy;
        }

        // ==================== 文本导出 ====================
        function exportText() {
            const R = window.__lastResult;
            if (!R) return;
            const isZh = currentLang === 'zh';
            const dy = R.dongYao;
            const lines = [
                t('resultHeader'),
                '='.repeat(40),
                `${t('questionLabelExport')} ${R.question || '-'}`,
                `${t('timeBeijing')} ${R.timeBeijing || '-'}`,
                `${t('timeTrueSolar')} ${R.trueSolar ? R.trueSolar.trueSolarTime : '-'}`,
                '',
                `${t('primaryGuaLabel')} ${R.benName[currentLang]}`,
                `${t('judgmentLabel')}: ${R.benJudgment[currentLang]}`,
                `${t('changedGuaLabel')} ${R.bianName[currentLang]}`,
                `${t('judgmentLabel')}: ${R.bianJudgment[currentLang]}`,
                `${t('movingYaoLabel')} ${yaoName[currentLang][dy - 1]}`,
                `${t('yaociLabel')}: ${R.yaoci}`,
                '',
                t('analysisPrimary'),
                R.benExplain[currentLang],
                '',
                t('analysisChanged'),
                R.bianExplain[currentLang],
                '',
                t('analysisMoving'),
                dongyaoMeanings[currentLang][dy],
                '',
                isZh ? '—— 心诚则灵，结果仅供参考 ——' : '—— For reference only ——'
            ];
            const blob = new Blob([lines.join('\n')], { type: 'text/plain;charset=utf-8' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = t('exportFileName') + new Date().toISOString().slice(0, 10) + '.txt';
            a.click();
            URL.revokeObjectURL(a.href);
            showToast(t('toastSaved'));
        }

        // ==================== 事件绑定 ====================
        $('langZh').addEventListener('click', () => switchLanguage('zh'));
        $('langEn').addEventListener('click', () => switchLanguage('en'));
        $('warningHead').addEventListener('click', () => {
            $('warningBox').classList.toggle('collapsed');
            $('warningToggle').textContent = $('warningBox').classList.contains('collapsed') ? t('warningExpand') : t('warningCollapse');
        });
        document.querySelectorAll('.gender-btn').forEach(b => {
            b.addEventListener('click', () => {
                document.querySelectorAll('.gender-btn').forEach(x => x.classList.remove('active'));
                b.classList.add('active');
                currentGender = b.dataset.gender;
            });
        });
        document.querySelectorAll('.mode-btn').forEach(b => {
            b.addEventListener('click', () => {
                document.querySelectorAll('.mode-btn').forEach(x => x.classList.remove('active'));
                b.classList.add('active');
                currentMode = b.dataset.mode;
            });
        });
        $('startBtn').addEventListener('click', startDivination);
        $('confirmBtn').addEventListener('click', confirmSplit);
        $('nextStepBtn').addEventListener('click', nextStep);
        $('restartBtn').addEventListener('click', () => {
            $('resultView').hidden = true;
            $('divinationView').hidden = true;
            $('homeView').hidden = false;
            $('questionInput').value = '';
            window.__lastResult = null;
            updateTodayHint();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        });
        $('shareCardBtn').addEventListener('click', drawShareCard);
        $('exportBtn').addEventListener('click', exportText);

        // 历史记录
        function openHistory() {
            $('historyModal').hidden = false;
            $('historySearch').value = '';
            renderHistoryList('');
        }
        $('historyBtn').addEventListener('click', openHistory);
        $('historyBtn2').addEventListener('click', openHistory);
        $('historyClose').addEventListener('click', () => { $('historyModal').hidden = true; });
        $('historySearch').addEventListener('input', (e) => renderHistoryList(e.target.value));
        $('historyExportBtn').addEventListener('click', exportHistory);
        $('clearHistoryBtn').addEventListener('click', () => {
            if (loadRecords().length === 0) { showToast(t('toastNoHistory')); return; }
            if (!confirm(t('confirmClear'))) return;
            localStorage.removeItem(HISTORY_KEY);
            showToast(t('toastCleared'));
            renderHistoryList('');
            updateTodayHint();
        });

        // 设置
        function syncSwitches() {
            $('soundSwitch').classList.toggle('on', settings.sound);
            $('vibrateSwitch').classList.toggle('on', settings.vibrate);
            $('breathSwitch').classList.toggle('on', settings.breath);
        }
        $('settingsBtn').addEventListener('click', () => {
            $('settingsModal').hidden = false;
            syncSwitches();
        });
        $('settingsClose').addEventListener('click', () => { $('settingsModal').hidden = true; });
        $('soundSwitch').addEventListener('click', () => {
            settings.sound = !settings.sound; saveSettings(); syncSwitches();
            if (settings.sound) { initAudio(); playBambooSound(true, 0.8); }
        });
        $('vibrateSwitch').addEventListener('click', () => {
            settings.vibrate = !settings.vibrate; saveSettings(); syncSwitches(); vibrate();
        });
        $('breathSwitch').addEventListener('click', () => {
            settings.breath = !settings.breath; saveSettings(); syncSwitches();
        });
        $('themeDarkBtn').addEventListener('click', () => { settings.theme = 'dark'; saveSettings(); applyTheme(); });
        $('themeLightBtn').addEventListener('click', () => { settings.theme = 'light'; saveSettings(); applyTheme(); });
        [$('settingsModal'), $('historyModal')].forEach(m => {
            m.addEventListener('click', (e) => { if (e.target === m) m.hidden = true; });
        });

        // ==================== 初始化 ====================
        document.querySelector('.gender-btn[data-gender="male"]').classList.add('active');
        document.querySelector('.mode-btn[data-mode="manual"]').classList.add('active');
        buildStalks();
        applyTheme();
        applyLanguage();

    </script>
</body>
